# ========================================
# Link Platform - 主配置文件
# ========================================
# 本文件仅包含所有环境共享的配置
# 环境特定配置请使用:
# - application-dev.yml   (开发环境)
# - application-test.yml  (测试环境)
# - application-prod.yml  (生产环境)
# ========================================

# 激活的Profile(默认使用dev,通过启动参数覆盖)
# 注意: 此处不要使用 ${} 引用,直接由Maven过滤或启动参数指定
spring:
  profiles:
    active: @spring.profiles.active@
  application:
    name: top-link-mall

server:
  port: 48080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
  # Undertow 服务器配置
  undertow:
    io-threads: 0
    worker-threads: 0
    no-request-timeout: 30000
    buffer-size: 16384
    multipart-max-entity-size: 16777216



  # Jackson 全局配置 (符合 Google API 规范)
  jackson:
    serialization:
      # 开启日期转时间戳
      write-dates-as-timestamps: true
      # 强制关闭纳秒，确保返回的是前端易处理的 13 位毫秒时间戳
      write-date-timestamps-as-nanoseconds: false
      write-durations-as-timestamps: false
      fail-on-empty-beans: false
    # 命名策略：驼峰转下划线 (totalCount -> total_count)
    property-naming-strategy: SNAKE_CASE
    # 过滤 null 字段，精简响应体
    default-property-inclusion: non_null
    time-zone: GMT+8
    locale: zh_CN
    deserialization:
      # 忽略前端传入但后端不存在的属性，增强兼容性
      fail-on-unknown-properties: false

# MyBatis Plus 增强配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: me.link.**.domain
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      update-strategy: not_null
      insert-strategy: not_null
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true

# Sa-Token 安全配置
sa-token:
  token-name: Authorization
  timeout: 3600
  active-timeout: 1800
  is-concurrent: false
  is-share: false
  token-style: tik
  is-log: false
  auto-renew: true
  is-read-header: true
  is-read-cookie: false
  is-color-log: false
  token-prefix: Bearer

# 监控配置 (对接 Spring Boot Admin / Actuator)
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    db:
      enabled: false
    redis:
      enabled: false
    defaults:
      enabled: true

# SpringDoc 接口文档配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
    filter: true
    disable-swagger-default-url: true
# ========================================
# Link Platform - 主配置文件
# ========================================
# 本文件仅包含所有环境共享的配置
# 环境特定配置请使用:
# - application-dev.yml   (开发环境)
# - application-test.yml  (测试环境)
# - application-prod.yml  (生产环境)
# ========================================

# 激活的Profile(默认使用dev,通过启动参数覆盖)
# 注意: 此处不要使用 ${} 引用,直接由Maven过滤或启动参数指定
spring:
  profiles:
    active: @spring.profiles.active@
  application:
    name: top-link-mall
  # Jackson 全局配置 (符合 Google API 规范)
  jackson:
    serialization:
      # 关闭"日期转时间戳":LocalDateTime 统一走 LinkJacksonAutoConfiguration 显式注册的字符串格式
      write-dates-as-timestamps: false
      # 强制关闭纳秒，确保返回的是前端易处理的 13 位毫秒时间戳
      write-date-timestamps-as-nanoseconds: false
      write-durations-as-timestamps: false
      fail-on-empty-beans: false
    # 命名策略：驼峰转下划线 (totalCount -> total_count)
    property-naming-strategy: SNAKE_CASE
    # 过滤 null 字段，精简响应体
    default-property-inclusion: non_null
    time-zone: GMT+8
    locale: zh_CN
    deserialization:
      # 忽略前端传入但后端不存在的属性，增强兼容性
      fail-on-unknown-properties: false
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:a29_0626@foxmail.com}
    password: ${MAIL_PASSWORD:lpzotlqkvqvibhbd}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

server:
  port: 48080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
  # Undertow 服务器配置
  undertow:
    io-threads: 0
    worker-threads: 0
    no-request-timeout: 30000
    buffer-size: 16384
    multipart-max-entity-size: 16777216

# 客户端 IP 解析安全配置
link:
  mobile-crypto:
    # 开发默认值仅用于本地联调。生产环境请通过环境变量覆盖，并将 encryption-key 与 hash-key 分开保管。
    encryption-key: ${LINK_MOBILE_CRYPTO_ENCRYPTION_KEY:link-bootstrap-dev-mobile-encryption-key}
    hash-key: ${LINK_MOBILE_CRYPTO_HASH_KEY:link-bootstrap-dev-mobile-hash-key}
    key-version: ${LINK_MOBILE_CRYPTO_KEY_VERSION:1}
  api-crypto:
    # 开启后接口请求体使用 {"data":"RSA密文"} 传输,服务端解密后再进入 Controller;
    # 响应体返回 {"data":"RSA密文"},密文内容为原统一响应 JSON。
    enabled: false
    request-field: data
    response-field: data
    private-key: 
    public-key: 
    include-paths:
      - /api/v1/**
    exclude-paths:
      - /api/v1/auth/public-keys/current
      - /actuator/**
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
  security:
    cors:
      # 默认仅允许本地开发前端携带凭证跨域。生产环境请在 application-prod.yml 中通过环境变量配置明确域名。
      allowed-origin-patterns:
        - http://localhost:*
        - http://127.0.0.1:*
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      exposed-headers:
        - X-Trace-Id
      allow-credentials: ${LINK_CORS_ALLOW_CREDENTIALS:true}
      max-age: ${LINK_CORS_MAX_AGE:1h}
    human-verification:
      enabled: ${LINK_HUMAN_VERIFICATION_ENABLED:false}
      verify-url: ${LINK_HUMAN_VERIFICATION_VERIFY_URL:https://challenges.cloudflare.com/turnstile/v0/siteverify}
      secret: ${LINK_HUMAN_VERIFICATION_SECRET:0x4AAAAAADqoAuvWKLN9zJkkqvmsCc8RwkA}
      response-param: ${LINK_HUMAN_VERIFICATION_RESPONSE_PARAM:response}
      secret-param: ${LINK_HUMAN_VERIFICATION_SECRET_PARAM:secret}
      remote-ip-param: ${LINK_HUMAN_VERIFICATION_REMOTE_IP_PARAM:remoteip}
      timeout: ${LINK_HUMAN_VERIFICATION_TIMEOUT:3s}
    email-code:
      ttl: ${LINK_EMAIL_CODE_TTL:5m}
      length: ${LINK_EMAIL_CODE_LENGTH:6}
      max-verify-attempts: ${LINK_EMAIL_CODE_MAX_VERIFY_ATTEMPTS:5}
      secret: ${LINK_EMAIL_CODE_SECRET:link-bootstrap-dev-email-code-secret}
      from: ${LINK_EMAIL_CODE_FROM:}
      sender-name: ${LINK_EMAIL_CODE_SENDER_NAME:Link Platform}
      system-name: ${LINK_EMAIL_CODE_SYSTEM_NAME:Link Platform}
      company-name: ${LINK_EMAIL_CODE_COMPANY_NAME:Link Platform}
      subject: ${LINK_EMAIL_CODE_SUBJECT:登录验证码}
      send-ip-email-window: ${LINK_EMAIL_CODE_SEND_IP_EMAIL_WINDOW:10m}
      send-ip-email-max-requests: ${LINK_EMAIL_CODE_SEND_IP_EMAIL_MAX_REQUESTS:3}
    client-ip:
      trust-forward-headers: false
      forward-headers:
        - X-Forwarded-For

# MyBatis Plus 增强配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: me.link.bootstrap.infrastructure.persistence.po
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      update-strategy: not_null
      insert-strategy: not_null
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
# Sa-Token 安全配置
sa-token:
  token-name: Authorization
  timeout: 3600
  active-timeout: 1800
  is-concurrent: false
  is-share: false
  token-style: tik
  is-log: false
  auto-renew: true
  is-read-header: true
  is-read-cookie: false
  is-color-log: false
  token-prefix: Bearer

# 监控配置 (对接 Spring Boot Admin / Actuator)
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    db:
      enabled: false
    redis:
      enabled: false
    defaults:
      enabled: true

# SpringDoc 接口文档配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
    filter: true
    disable-swagger-default-url: true
